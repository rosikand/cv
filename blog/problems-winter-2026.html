<!-- The new moat is proprietary data distilled into your own model's intelligence. This is directly analagous to what the data lock-in moat was for SaaS era co's.

Any "product" can be built and iterated quickly with coding agents. The cost of iteration falls to near zero.

Proprietary data obtained through distribution (and now, this data being distilled directly into the model) is the only moat.

All non-frontier lab vertical startups won't be defined by the product they build but the data they can gather to feed their own model.

In fact, in the limit, all vertical startups are just Data Collectors that use a "product" to get such data (which, also, oxymoronically, opens up another revenue stream for these startups: selling their data to the frontier labs to train on, meaning the next frontier model might just render their unique capabilities irrelevant).

The costs are (1) fine-tuning cost and (2) infra to host your own model, and repeating this loop periodically upon the presence of new data.

Said in a different angle, data lock-in isn't just customer data stored in rows in a data lake. But rather a new form of "data" emerges: trajectories you can RL your model on.

These trajectories are the only things separating your product from the frontier labs integrating it directly into their agent/model stack. -->
